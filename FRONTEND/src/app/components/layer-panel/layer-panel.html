<div class="panel">
  <div class="panel-header">
    <span>Layers</span>
    <button class="panel-close" type="button" aria-label="Close" (click)="close()">&times;</button>
  </div>

  <div class="panel-body layer-tree">
    <ng-container *ngFor="let node of getLayerTree(); trackBy: trackByNodeId">
      <ng-container *ngTemplateOutlet="treeNode; context: { $implicit: node, level: 0 }"></ng-container>
    </ng-container>

    <ng-template #treeNode let-node let-level="level">
      <div class="tree-row" [style.padding-left.px]="12 + level * 18">
        <button *ngIf="node.kind === 'group'" class="expand-btn" (click)="toggleExpanded(node)" type="button">
          <span class="expand-icon" [class.expanded]="node.expanded"></span>
        </button>
        <span *ngIf="node.kind !== 'group'" class="expand-spacer"></span>

        <label class="tree-label">
          <input
            type="checkbox"
            [ngModel]="node.checked"
            (ngModelChange)="toggleNode(node, $event)"
          />
          <span [class.group-title]="node.kind === 'group'">{{ node.title }}</span>
        </label>
      </div>

      <ng-container *ngIf="node.kind === 'group' && node.expanded">
        <ng-container *ngFor="let child of node.children || []; trackBy: trackByNodeId">
          <ng-container *ngTemplateOutlet="treeNode; context: { $implicit: child, level: level + 1 }"></ng-container>
        </ng-container>
      </ng-container>
    </ng-template>
  </div>
</div>
