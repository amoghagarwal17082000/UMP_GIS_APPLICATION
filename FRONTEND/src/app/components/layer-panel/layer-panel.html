<div class="panel">
  <div class="panel-header">
    <span>Layers</span>
    <button class="panel-close" (click)="close()">×</button>
  </div>

  <div class="panel-body">
    <div class="layer-item" *ngFor="let layer of layerManager.getLayers(); trackBy: trackByLayerId">
      <label>
        <input
          type="checkbox"
          [(ngModel)]="layer.visible"
          (change)="toggleLayer()"
        />
        {{ getLabel(layer) }}
      </label>
    </div>
  </div>
</div>
