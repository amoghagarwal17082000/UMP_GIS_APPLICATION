<div class="map-card card shadow-sm">
  <div class="card-body map-card-body">
    <div class="map-search-overlay">
      <app-station-search
        class="map-search-box"
        (stationSelected)="onStationSelected($event)"
        (searchCleared)="onSearchCleared()"
      ></app-station-search>
    </div>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>
</div>
