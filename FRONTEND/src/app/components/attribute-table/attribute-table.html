<div
  class="attr-dock"
  [class.open]="(open$ | async) === true"
  [style.height.px]="(open$ | async) ? expandedHeight : collapsedHeight"
>
  <!-- Thin toggle bar (always visible) -->
  <div class="attr-toggle-bar" (click)="toggle()">
    <div class="attr-toggle-center">
      <span class="attr-toggle-arrow" [class.down]="(open$ | async) === true"></span>
    </div>
  </div>

  <!-- Expanded content -->
  <div class="attr-body" [class.open]="(open$ | async) === true">
    <!-- Tabs -->
    <div class="attr-tabs">
      <ng-container *ngIf="active$ | async as active">
        <ng-container *ngIf="tabs$ | async as tabs">
        <div
          class="attr-tab"
          *ngFor="let t of tabs"
          [class.active]="t === active"
          (click)="setTab(t, $event)"
        >
          {{ t }}
        </div>
        </ng-container>
      </ng-container>
    </div>

    <!-- Table -->
    <div class="attr-content">
      <ng-container *ngIf="(datasets$ | async) as d">
        <ng-container *ngIf="(active$ | async) as a">
          <ng-container *ngIf="getDataset(d, a) as ds">
            <div class="attr-toolbar">
              <div class="attr-toolbar-actions">
                <button class="attr-action-btn" (click)="zoomToSelected(a, ds, $event)" [disabled]="!hasSelectionFor(a)">
                  Zoom To
                </button>
                <button class="attr-action-btn" (click)="clearSelection($event)" [disabled]="!hasSelectionFor(a)">
                  Clear Selection
                </button>
                <button class="attr-action-btn attr-action-btn-primary" (click)="exportCsv(a, ds, $event)" [disabled]="!ds.rows.length">
                  Export CSV
                </button>
              </div>
              <div class="attr-toolbar-right">
                <span class="attr-count">{{ ds.count }} records</span>
              </div>
            </div>
            <div class="attr-table-scroll" *ngIf="ds.rows.length; else empty">
              <table class="table table-sm table-bordered table-hover mb-0 attr-table">
                <thead>
                  <tr>
                    <th *ngFor="let c of ds.columns">{{ c }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    *ngFor="let r of ds.rows"
                    (click)="onRowClick(a, r, $event)"
                    (dblclick)="onRowDoubleClick(a, r, $event)"
                    [class.attr-row-selected]="isSelected(a, r)"
                    style="cursor:pointer;"
                  >
                    <td *ngFor="let c of ds.columns">{{ r[c] ?? '' }}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <ng-template #empty>
              <div class="p-3 text-muted">No records</div>
            </ng-template>
          </ng-container>
        </ng-container>
      </ng-container>
    </div>
  </div>
</div>
