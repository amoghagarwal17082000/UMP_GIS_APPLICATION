<!-- ===============================
     BACKGROUND MAP (GIS CONTEXT)
================================ -->
<img src="assets/images/Indian railway network in daylight.png" class="bg-map" alt="Railway background" />

<div class="train-loader-overlay" *ngIf="showTrainAnimation" [class.fade-out]="loaderFadingOut">
  <div class="train-loader-card">
    <img
      [src]="trainAnimationSrc"
      class="train-loader-gif"
      alt="Train loading animation"
      (error)="onTrainAnimationError($event)"
    />
  </div>
</div>

<div class="lang-pill">
  <span class="lang-icon">A</span>
  <span>English</span>
</div>

<div class="login-wrapper" [class.fade-out]="loginFadingOut">
  <div class="portal-card">
    <div class="portal-header">
      <div class="header-seg">
        <img src="assets/images/indian-national-emblem-ashoka.webp" class="logo" alt="Government of India" />
      </div>

      <div class="header-seg">
        <img src="assets/images/amofficialcris_logo.jpg" class="logo" alt="CRIS Logo" />
      </div>

      <div class="header-seg">
        <img src="assets/images/Indian_Railways.svg" class="logo" alt="Indian Railways Logo" />
      </div>
    </div>

    <div class="portal-body">
      <div class="brand-row">
        <h1 class="brand-title">
          <span class="rail-track-mark" aria-hidden="true"></span>
          <span>ndian Railways Geo Application</span>
        </h1>
      </div>

      <div class="hint">
        {{ loginStep === 'LOGIN' ? 'Sign in to continue' : 'Enter OTP received on mail' }}
      </div>

      <form
        *ngIf="loginStep === 'LOGIN'"
        class="form-area"
        (ngSubmit)="login()"
        #loginForm="ngForm"
      >
        <div class="field">
          <input
            type="text"
            name="username"
            class="line-input"
            placeholder="Enter User ID"
            required
            autocomplete="username"
            [(ngModel)]="username"
          />
        </div>

        <div class="field pw-field">
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            class="line-input"
            placeholder="Enter Password"
            required
            autocomplete="current-password"
            [(ngModel)]="password"
          />

          <button
            type="button"
            class="eye-btn"
            (click)="showPassword = !showPassword"
            aria-label="Toggle password visibility"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <label class="check-row">
          <input type="checkbox" name="consent" required [(ngModel)]="consent" />
          <span>
            I agree to the Asset Management Portal's
            <a href="#" class="link">Privacy Policy</a>
            and
            <a href="#" class="link">Terms Of Use</a>.
          </span>
        </label>

        <div class="captcha-row">
          <div class="captcha-img" aria-label="captcha image">
            <img *ngIf="captchaImage" [src]="captchaImage" class="captcha-svg" alt="captcha" />
          </div>

          <button
            type="button"
            class="captcha-refresh"
            aria-label="Refresh captcha"
            (click)="refreshCaptcha()"
          >
            <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
          </button>

          <input
            type="text"
            name="captchaValue"
            class="captcha-input"
            placeholder="Enter Captcha"
            required
            autocomplete="off"
            [(ngModel)]="captchaValue"
          />
        </div>

        <div class="sign-in-row">
          <button
            type="submit"
            class="next-btn sign-in-btn"
            [disabled]="loading || otpSending"
          >
            {{ loading ? 'Signing in...' : 'Sign in' }}
          </button>
        </div>

        <div *ngIf="error" class="error-text">
          {{ error }}
        </div>
      </form>

      <form
        *ngIf="loginStep === 'OTP'"
        class="form-area"
        (ngSubmit)="verifyOtp()"
        #otpForm="ngForm"
      >
        <div class="info-text" *ngIf="infoMsg">
          {{ infoMsg }}
        </div>

        <div class="field">
          <input
            type="text"
            name="otp"
            class="line-input text-center"
            placeholder="Enter OTP"
            required
            minlength="4"
            maxlength="8"
            autocomplete="one-time-code"
            [(ngModel)]="otp"
          />
        </div>

        <div class="sign-in-row">
          <button
            type="submit"
            class="next-btn sign-in-btn"
            [disabled]="loading"
          >
            {{ loading ? 'Connecting...' : 'Verify OTP' }}
          </button>

          <button
            type="button"
            class="next-btn"
            (click)="resendOtp()"
            [disabled]="loading"
          >
            Resend OTP
          </button>
        </div>

        <div *ngIf="error" class="error-text">
          {{ error }}
        </div>
      </form>

      <div class="portal-footer">Centre for Railway Information Systems</div>
    </div>
  </div>
</div>
