<div class="panel" id="panelEdit" *ngIf="edit.enabled">

  <!-- ================= HEADER ================= -->
 <!-- ================= HEADER (ALWAYS VISIBLE) ================= -->
<!-- ================= HEADER (ALWAYS VISIBLE, STATIC TITLE) ================= -->
<div class="panel-header">
  <h4>Edit Tool</h4>
  <button class="panel-close" aria-label="Close" (click)="close()">×</button>
</div>



  <!-- ================= BODY ================= -->
  <div class="panel-body">

    <div class="maker-navbar" *ngIf="mode === 'table' && isMaker()">
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="makerTab === 'edit'"
        (click)="setMakerTab('edit')"
      >
        Edit
      </button>
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="makerTab === 'rejected'"
        (click)="setMakerTab('rejected')"
      >
        Rejected Records
      </button>
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="makerTab === 'sent_for_deletion'"
        (click)="setMakerTab('sent_for_deletion')"
      >
        Sent for Deletion
      </button>
    </div>

    <div class="maker-navbar" *ngIf="mode === 'table' && isReviewer()">
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="checkerTab === 'pending'"
        (click)="setCheckerTab('pending')"
      >
        Pending
      </button>
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="checkerTab === 'approved'"
        (click)="setCheckerTab('approved')"
      >
        Approved
      </button>
      <button
        type="button"
        class="maker-nav-item"
        [class.active]="checkerTab === 'deletion_proposed'"
        (click)="setCheckerTab('deletion_proposed')"
      >
        Deletion Proposed
      </button>
    </div>

    <!-- ===== LAYER SELECTION ===== -->
    <div class="layer-picker" *ngIf="mode === 'table' && !isMakerRejectedView()" style="margin-bottom:8px;">
      <label>
        Select Assigned Layer
        <select
          [(ngModel)]="edit.editLayer"
          (change)="onLayerChange()"
        >
          <option [ngValue]="null">Select Layer</option>
          <option value="stations">Stations</option>
          <option value="landplan">Land Plan on Track</option>
        </select>
      </label>
    </div>

    <div class="layer-picker rejected-picker" *ngIf="isMakerRejectedView()" style="margin-bottom:8px;">
      <label>
        Select Assigned Layer (Rejected Records)
        <select
          [(ngModel)]="rejectedLayer"
          (change)="onRejectedLayerChange()"
        >
          <option [ngValue]="null">Select Layer</option>
          <option value="stations">Stations</option>
          <option value="landplan">Land Plan on Track</option>
        </select>
      </label>
    </div>

    <!-- <div class="table-meta" *ngIf="mode === 'table' && edit.editLayer === 'stations'">
  Showing {{ showingCount }} of {{ filteredTotal }} records (Page {{ page }} / {{ totalPages }})
</div> -->

    <!-- ================= TABLE MODE ================= -->
    <ng-container *ngIf="currentTableLayer && mode === 'table'">

      <div class="toolbar">
        <button class="add-btn" *ngIf="!isMakerRejectedView() && currentTableLayer === 'stations'" (click)="startAddStation()">Add New Record</button>
        <div class="spacer"></div>
        <label class="search">Search:</label>
        <input
          type="search"
          placeholder="code / state / district"
          [(ngModel)]="search"
          (ngModelChange)="onSearchChange()"
        />
      </div>

      <div class="card">
        <div class="table-scroll">
          <table class="tbl">
            <thead>
              <tr>
                <th *ngFor="let col of activeTableColumns">{{ col.label }}</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngIf="loading">
                <td [attr.colspan]="tableColSpan" class="empty">Loading...</td>
              </tr>

              <tr *ngIf="!loading && rows.length === 0">
                <td [attr.colspan]="tableColSpan" class="empty">No records</td>
              </tr>

              <tr *ngFor="let r of rows">
                <td *ngFor="let col of activeTableColumns">
                  <ng-container *ngIf="col.stationLink; else plainCell">
                    <button
                      type="button"
                      class="sttn-link"
                      (click)="zoomToStationFromRow(r)"
                      [disabled]="!getCellValue(r, col.key)"
                      [title]="'Zoom to ' + formatCell(r, col.key)"
                    >
                      {{ formatCell(r, col.key) }}
                    </button>
                  </ng-container>
                  <ng-template #plainCell>{{ formatCell(r, col.key) }}</ng-template>
                </td>
                <td class="actions-cell">
                  <ng-container *ngIf="isMakerRejectedView(); else regularActions">
                    <button class="action-btn preview-btn" (click)="previewRejectedRow(r)" title="Preview" aria-label="Preview">
                      <i class="bi bi-pencil-fill"></i>
                    </button>
                    <button class="action-btn accept-btn" (click)="sendForwardRejected(r)" title="Send Forward" aria-label="Send Forward">
                      <i class="bi bi-check2"></i>
                    </button>
                    <button class="action-btn reject-btn" (click)="deleteRejectedRow(r)" title="Delete" aria-label="Delete">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </ng-container>
                  <ng-template #regularActions>
                    <ng-container *ngIf="isReviewer(); else nonCheckerActions">
                    <ng-container *ngIf="isCheckerDeletionProposedView(); else checkerDefaultActions">
                      <button class="action-btn accept-btn" (click)="acceptDeletionRow(r)" title="Accept Deletion" aria-label="Accept Deletion">
                        <i class="bi bi-check2"></i>
                      </button>
                      <button class="action-btn reject-btn" (click)="rejectDeletionRow(r)" title="Reject Deletion" aria-label="Reject Deletion">
                        <i class="bi bi-x-lg"></i>
                      </button>
                      <button class="action-btn checker-edit-btn" (click)="editRow(r)" title="Preview" aria-label="Preview">
                        <i class="bi bi-eye-fill"></i>
                      </button>
                    </ng-container>
                    <ng-template #checkerDefaultActions>
                      <button class="action-btn checker-edit-btn" (click)="editRow(r)" title="Preview" aria-label="Preview">
                        <i class="bi bi-eye-fill"></i>
                      </button>
                      <button
                        class="action-btn accept-btn"
                        (click)="acceptRow(r)"
                        [title]="isApprover() ? 'Finalised' : 'Forward'"
                        [attr.aria-label]="isApprover() ? 'Finalised' : 'Forward'"
                        *ngIf="(isChecker() || isApprover()) && !isCheckerSentToApproverView()"
                      >
                        <i class="bi bi-check2"></i>
                      </button>
                      <button
                        class="action-btn reject-btn"
                        (click)="rejectRow(r)"
                        title="Sent Back"
                        aria-label="Sent Back"
                        *ngIf="(isChecker() || isApprover()) && !isCheckerSentToApproverView()"
                      >
                        <i class="bi bi-x-lg"></i>
                      </button>
                    </ng-template>
                  </ng-container>
                  <ng-template #nonCheckerActions>
                    <ng-container *ngIf="isMakerSentForDeletionView(); else makerDefaultActions">
                      <button class="action-btn preview-btn" (click)="editRow(r)" title="Preview" aria-label="Preview">
                        <i class="bi bi-eye-fill"></i>
                      </button>
                    </ng-container>
                    <ng-template #makerDefaultActions>
                      <button class="action-btn maker-edit-btn" (click)="editRow(r)">Edit</button>
                      <button class="action-btn maker-delete-btn" (click)="deleteRow(r)" [disabled]="deleting">Delete</button>
                    </ng-template>
                  </ng-template>
                  </ng-template>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

<div class="pager">
  <div class="pager-controls">
    <button
      class="nav-btn"
      (click)="prevPage()"
      [disabled]="page === 1"
    >
      ← Prev
    </button>

    <button
      class="nav-btn"
      (click)="nextPage()"
      [disabled]="page >= totalPages"
    >
      Next →
    </button>
  </div>

  <div class="pager-right">
    {{ showingFrom }}–{{ showingTo }} of {{ filteredTotal }}
    <span class="pager-separator">•</span>
    Page {{ page }}/{{ totalPages }}
  </div>
</div>
      </div>
    </ng-container>

    <!-- ================= EDIT MODE ================= -->
<!-- ================= EDIT MODE ================= -->
<div *ngIf="mode === 'edit'" class="edit-form">

  <div class="edit-top">
    <div>
      <h3 class="edit-title">Asset Details</h3>
      <!-- <div class="edit-subtitle">Selected Asset Details</div> -->
    </div>

    <button class="back-btn" (click)="cancelEdit()">← Back</button>
  </div>

  <div class="form-grid">

    <!-- Station Code + Validate -->
    <div class="field full">
      <label class="field-label">Station Code <span *ngIf="isMandatoryStationField('sttncode')">*</span></label>
      <div class="field-inline">
        <input
          class="field-input"
          type="text"
          [(ngModel)]="draft.sttncode"
          [readonly]="isStationFieldsLocked()"
        />
        <button
          class="btn secondary"
          type="button"
          (click)="validateStationCode()"
          [disabled]="validating"
          *ngIf="!isReviewer() && !isMakerSentForDeletionView()"
        >
          {{ validating ? 'Validating...' : 'Validate' }}
        </button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Station Name <span *ngIf="isMandatoryStationField('sttnname')">*</span></label>
        <input
          class="field-input"
          type="text"
          [(ngModel)]="draft.sttnname"
          [readonly]="isStationFieldsLocked()"
        />
    </div>

    <div class="field" *ngIf="isMakerSentForDeletionView()">
      <label class="field-label">Status</label>
      <input class="field-input" type="text" [value]="draft?.status || '--'" readonly />
    </div>

    <div class="field">
      <label class="field-label">Station Type <span *ngIf="isMandatoryStationField('stationtype')">*</span></label>
      <input class="field-input" type="text" [(ngModel)]="draft.stationtype" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>


    <div class="field">
      <label class="field-label">Dist (KM) <span *ngIf="isMandatoryStationField('distkm')">*</span></label>
      <input class="field-input" type="number" [(ngModel)]="draft.distkm" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>

    <div class="field">
      <label class="field-label">Dist (M) <span *ngIf="isMandatoryStationField('distm')">*</span></label>
      <input class="field-input" type="number" [(ngModel)]="draft.distm" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>

    <div class="field">
      <label class="field-label">State <span *ngIf="isMandatoryStationField('state')">*</span></label>
      <input class="field-input" type="text" [(ngModel)]="draft.state" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>

    <div class="field">
      <label class="field-label">District <span *ngIf="isMandatoryStationField('district')">*</span></label>
      <input class="field-input" type="text" [(ngModel)]="draft.district" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>

    <div class="field">
      <label class="field-label">Category <span *ngIf="isMandatoryStationField('category')">*</span></label>
      <input
        class="field-input"
        type="text"
        [(ngModel)]="draft.category"
        [readonly]="isStationFieldsLocked()"
      />
    </div>

    <div class="field full">
      <label class="field-label">Constituency <span *ngIf="isMandatoryStationField('constituency')">*</span></label>
      <input class="field-input" type="text" [(ngModel)]="draft.constituency" [readonly]="isReviewer() || isMakerSentForDeletionView()" />
    </div>
  </div>

<div class="form-actions" *ngIf="!isMakerSentForDeletionView()">

  <ng-container *ngIf="mode === 'edit' && isCheckerDeletionProposedView()">
    <button class="btn primary" type="button" (click)="acceptDeletionDraft()">
      Accept Deletion
    </button>
    <button class="btn ghost" type="button" (click)="rejectDeletionDraft()">
      Reject Deletion
    </button>
  </ng-container>

  <ng-container *ngIf="isReviewer() && !isCheckerDeletionProposedView()">
    <button class="btn primary" type="button" (click)="sendToApproverDraft()" [disabled]="saving">
      {{ isApprover() ? 'Finalised' : 'Sent to Approver' }}
    </button>
    <button class="btn ghost" type="button" (click)="sendBackToMakerDraft()" [disabled]="saving">
      Sent Back
    </button>
  </ng-container>

  <ng-container *ngIf="isMaker()">
    <button class="btn ghost" type="button" (click)="deleteDraft()" [disabled]="deleting">
      {{ deleting ? 'Deleting...' : 'Delete Record' }}
    </button>

    <button class="btn primary" type="button" (click)="startGeometryEdit()">
      Edit Geometry
    </button>

    <button
      class="btn primary"
      type="button"
      (click)="saveGeometry()"
      [disabled]="!geomEditing"
    >
      Save Geometry
    </button>

    <button class="btn primary" type="button" (click)="send()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Send' }}
    </button>
  </ng-container>
</div>



  <div class="error" *ngIf="error">
    {{ error }}
  </div>

  <p class="note">
    * For Station: All starred fields are mandatory | For Landplan: Polygon geometry required
  </p>

</div>


  </div>
</div>
